<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>動畫瘋截圖小工具</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>動畫瘋截圖小工具</h1>
          <p id="statusText" class="status">尚未截圖</p>
        </div>
        <button id="settingsButton" class="icon-button" type="button" title="設定" aria-label="開啟設定">
          &#9881;
        </button>
      </header>

      <button id="captureButton" class="primary-button" type="button">
        立即截圖
      </button>

      <section id="gifPanel" class="gif-panel main-gif-panel" aria-label="GIF 製作">
        <div class="panel-title">
          <strong>GIF 小片段</strong>
          <small>直接擷取影片影格製作 GIF，不包含聲音。</small>
        </div>

        <div class="timeline-field">
          <div class="timeline-header">
            <span>影片時間軸</span>
            <button id="syncGifTimelineButton" class="tiny-button" type="button">目前時間</button>
          </div>
          <small>選擇 GIF 的開始與結束時間，最長 10 秒。</small>
          <div class="time-input-grid">
            <label>
              <span>開始</span>
              <input id="gifStartTime" type="text" inputmode="numeric" value="00:00" aria-label="GIF 開始時間">
            </label>
            <label>
              <span>結束</span>
              <input id="gifEndTime" type="text" inputmode="numeric" value="00:05" aria-label="GIF 結束時間">
            </label>
            <label>
              <span>秒數</span>
              <input id="gifClipSeconds" type="number" min="0.5" max="10" step="0.5" value="5" aria-label="GIF 秒數">
            </label>
          </div>
          <div class="timeline-meta">
            <span id="gifDurationValue">長度 5 秒</span>
            <span id="gifVideoDurationValue">影片 00:00</span>
          </div>
        </div>

        <label class="field">
          <span>GIF 解析度</span>
          <small>解析度越高，檔案越大、製作時間越久。</small>
          <select id="gifResolution">
            <option value="720p">720P</option>
            <option value="1080p">1080P</option>
            <option value="1440p">1440P</option>
          </select>
        </label>

        <label class="field">
          <span>GIF FPS</span>
          <small>最低 30 FPS，高 FPS 會明顯增加檔案大小。</small>
          <select id="gifFps">
            <option value="30">30 FPS</option>
            <option value="50">50 FPS</option>
          </select>
        </label>

        <button id="createGifButton" class="secondary-button" type="button">
          開始製作 GIF
        </button>
        <p id="gifProgress" class="progress-text" aria-live="polite">尚未製作 GIF</p>
      </section>

      <section class="settings" aria-label="截圖設定">
        <label class="setting-row">
          <span>
            <strong>自動下載</strong>
            <small>截圖後儲存 PNG</small>
          </span>
          <input id="autoDownload" type="checkbox">
        </label>

        <label class="setting-row">
          <span>
            <strong>複製到剪貼簿</strong>
            <small>可貼到支援圖片的應用程式</small>
          </span>
          <input id="copyToClipboard" type="checkbox">
        </label>
      </section>

      <section id="settingsPanel" class="settings-panel" aria-label="進階設定" hidden>
        <div class="settings-panel-header">
          <h2>設定</h2>
          <button id="closeSettingsButton" class="close-button" type="button" aria-label="關閉設定">
            &times;
          </button>
        </div>

        <label class="field">
          <span>下載子資料夾</span>
          <small>會建立在 Chrome 預設 Downloads 資料夾底下，留空則直接存到 Downloads。</small>
          <div class="button-row">
            <input id="downloadSubfolder" type="text" placeholder="AnimeScreenshots" autocomplete="off" spellcheck="false">
            <button id="clearFolderButton" class="ghost-button" type="button">
              清除
            </button>
          </div>
        </label>

        <label class="setting-row compact-setting">
          <span>
            <strong>依動畫名稱建立資料夾</strong>
            <small>截圖會放進動畫名稱資料夾。</small>
          </span>
          <input id="organizeByAnimeName" type="checkbox">
        </label>

        <label class="field">
          <span>輸出解析度</span>
          <small>依高度縮小截圖，不會放大超過原始畫面。</small>
          <select id="outputResolution">
            <option value="original">原始解析度</option>
            <option value="720p">720P</option>
            <option value="1080p">1080P</option>
            <option value="1440p">1440P</option>
          </select>
        </label>

        <label class="field">
          <span>頁面快捷鍵</span>
          <small>按下錄製後，直接按新的鍵盤組合。</small>
          <button id="recordShortcutButton" class="shortcut-recorder" type="button">
            <span class="shortcut-label">錄製快捷鍵</span>
            <span id="shortcutDisplay">Shift+C</span>
          </button>
        </label>

        <label class="field">
          <span>GIF 製作快捷鍵</span>
          <small>在動畫瘋頁面按下後，會開啟 GIF 製作面板。</small>
          <button id="recordGifShortcutButton" class="shortcut-recorder" type="button">
            <span class="shortcut-label">錄製 GIF 快捷鍵</span>
            <span id="gifShortcutDisplay">Shift+G</span>
          </button>
        </label>

        <p id="settingsMessage" class="settings-message" aria-live="polite"></p>
      </section>

      <div id="popupNotice" class="popup-notice" role="status" aria-live="polite" hidden></div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
